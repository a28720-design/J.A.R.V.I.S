<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S.</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

  <!-- ── Fundo de partículas ── -->
  <canvas id="particles"></canvas>

  <!-- ── Wrapper principal ── -->
  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="logo">
        <span class="logo-j">J</span><span class="logo-dot">.</span><span
             class="logo-j">A</span><span class="logo-dot">.</span><span
             class="logo-j">R</span><span class="logo-dot">.</span><span
             class="logo-j">V</span><span class="logo-dot">.</span><span
             class="logo-j">I</span><span class="logo-dot">.</span><span
             class="logo-j">S</span><span class="logo-dot">.</span>
      </div>
      <p class="subtitulo">Assistente Virtual Inteligente</p>
      <div class="header-line"></div>
    </header>

    <!-- Conteúdo central -->
    <main>

      <!-- Orb animado -->
      <div class="orb-container">
        <div class="orb-ring ring-3"></div>
        <div class="orb-ring ring-2"></div>
        <div class="orb-ring ring-1"></div>
        <div class="orb" id="orb">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none"
               xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="2" width="6" height="11" rx="3"
                  fill="currentColor"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="8" y1="21" x2="16" y2="21"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <!-- Ondas de áudio (visíveis ao ouvir) -->
        <div class="wave-bars" id="waveBars">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Estado -->
      <div class="status-badge" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">STANDBY</span>
      </div>

      <!-- Botão microfone -->
      <button class="btn-mic" id="btnMic" onclick="iniciarEscuta()">
        <span class="btn-ripple"></span>
        🎤&nbsp;&nbsp;FALAR
      </button>

    </main>

    <!-- Painel de chat (glassmorphism) -->
    <section class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <span class="chat-title">▸ REGISTO DE ATIVIDADE</span>
        <button class="btn-clear" onclick="limparChat()">limpar</button>
      </div>
      <div class="chat-body" id="chatBody"></div>
    </section>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
